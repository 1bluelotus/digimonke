<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micaela — Contact</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body>

<!-- Mobile placeholder -->
<div id="mobile-placeholder">
  <div class="mark">✦ ✦ ✦</div>
  <h2>Micaela</h2>
  <p>Mobile experience coming soon.<br>Please visit on a larger screen.</p>
</div>

<!-- Nav panel -->
<div id="chrome-panel">
  <img id="avatar" src="assets/avatar.png" alt="Micaela" width="64" height="64">
  <a id="site-name" href="index.html">Micaela</a>
  <div id="site-tagline">Digital Works</div>
  <nav id="nav">
    <a href="index.html" data-page="index.html">Home</a>
    <a href="about.html" data-page="about.html">About</a>
    <a href="archive.html" data-page="archive.html">Archive</a>
    <a href="https://artistree.io/digitalmonkey" target="_blank" rel="noopener">Commission</a>
    <a href="contact.html" data-page="contact.html">Contact</a>
    <a href="#" id="socials-toggle">Socials</a>
    <div id="socials-flyout">
      <a href="https://www.youtube.com/@DigitalMonkey_" target="_blank" rel="noopener">Youtube</a>
      <a href="https://www.tumblr.com/digitalmonkeyy" target="_blank" rel="noopener">Tumblr</a>
      <a href="https://cara.app/antzzzdraws" target="_blank" rel="noopener">Cara</a>
    </div>
  </nav>
</div>

<!-- Page content -->
<div class="page-content">
  <div class="page-inner">
    <h1 class="contact-heading">Get in Touch</h1>
    <div class="contact-subtitle">Commissions · Collaborations · Inquiries</div>
    <a class="contact-email" href="mailto:hello@micaela.art">hello@micaela.art</a>
    <form class="contact-form" onsubmit="return false;">
      <label>
        Name
        <input type="text" placeholder="Your name" autocomplete="name">
      </label>
      <label>
        Email
        <input type="email" placeholder="your@email.com" autocomplete="email">
      </label>
      <label>
        Message
        <textarea placeholder="Tell me about your project..."></textarea>
      </label>
      <button type="submit">Send</button>
    </form>
  </div>
</div>

<script src="js/nav.js"></script>
</body>
</html>
